# Production-oriented stack template (POST-07)
# Customize secrets, volumes, and TLS termination before use.

services:
  api:
    build:
      context: ../backend
    env_file:
      - ../backend/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      RATE_LIMIT_ENABLED: "true"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: immigration_law
      POSTGRES_USER: sourcepath
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  # Ollama should run on a private host or GPU node reachable only from `api`.
  # Do not expose Ollama to the public internet.

volumes:
  pgdata:
